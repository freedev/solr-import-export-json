name: Release

on:
  push:
    tags:
      - 'v*-solr*'

jobs:
  release:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Extract versions from tag
        id: versions
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          APP_VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/-solr.*//')
          SOLR_VERSION=$(echo "$TAG" | sed 's/.*-solr//')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "solr_version=$SOLR_VERSION" >> $GITHUB_OUTPUT

      - name: Set Maven versions
        run: |
          mvn -B versions:set -DnewVersion=${{ steps.versions.outputs.app_version }} -DgenerateBackupPoms=false
          mvn -B versions:set-property -Dproperty=solr.version -DnewVersion=${{ steps.versions.outputs.solr_version }} -DgenerateBackupPoms=false

      - name: Build with Maven
        run: mvn -B --no-transfer-progress package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.versions.outputs.tag }}
          tag_name: ${{ steps.versions.outputs.tag }}
          files: target/solr-import-export-${{ steps.versions.outputs.app_version }}.jar
          generate_release_notes: true
